<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mika 3D Wave</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background:
          linear-gradient(rgba(15, 23, 42, 0.1), rgba(15, 23, 42, 0.2)),
          url("./backgrounds/study-room-sunlit.png") center / cover no-repeat;
      }

      #stage {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      #loader {
        position: fixed;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 22%, rgba(255, 255, 255, 0.22), transparent 45%),
          rgba(220, 228, 219, 0.42);
        color: #26313f;
        transition:
          opacity 320ms ease,
          visibility 320ms ease;
      }

      .loader-card {
        width: min(280px, calc(100vw - 48px));
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 8px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.68);
        box-shadow: 0 18px 54px rgba(15, 23, 42, 0.16);
        backdrop-filter: blur(14px);
      }

      .loader-label {
        margin: 0 0 10px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .loader-track {
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(38, 49, 63, 0.12);
      }

      #loader-progress {
        width: 12%;
        height: 100%;
        border-radius: inherit;
        background: #236b8e;
        transition: width 180ms ease;
      }

      #loader-note {
        min-height: 18px;
        margin: 9px 0 0;
        color: rgba(38, 49, 63, 0.7);
        font-size: 12px;
        line-height: 1.4;
      }

      body.is-ready #loader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      body.is-error #loader {
        background: rgba(250, 245, 241, 0.78);
      }
    </style>
  </head>
  <body>
    <canvas id="stage" aria-label="Mika 3D anime model waving"></canvas>
    <div id="loader" role="status" aria-live="polite">
      <div class="loader-card">
        <p class="loader-label">Loading Mika</p>
        <div class="loader-track"><div id="loader-progress"></div></div>
        <p id="loader-note">Preparing model...</p>
      </div>
    </div>
    <script type="module" src="./app.bundle.js"></script>
  </body>
</html>
